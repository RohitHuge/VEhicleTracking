<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - VehiX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <!-- Leaflet Routing Machine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030014; color: white; }
        #map { height: 40vh; width: 100%; border-radius: 20px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .leaflet-routing-container { display: none !important; } /* Hide the turn-by-turn UI */
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 space-y-4">

    <!-- Header -->
    <div class="flex justify-between items-center bg-indigo-600/10 p-4 rounded-2xl border border-indigo-500/20">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-xl">V</div>
            <h1 class="text-xl font-bold">Driver Mode</h1>
        </div>
        <button onclick="logout()" class="p-2 hover:bg-white/5 rounded-xl transition-colors text-gray-400 font-bold">LOGOUT</button>
    </div>

    <!-- Map Container -->
    <div id="map" class="shadow-2xl border border-white/5"></div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 gap-4 text-center">
        <div class="glass p-4 rounded-2xl border border-white/5">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Current Speed</span>
            <span id="speed" class="text-3xl font-bold text-indigo-400">0</span>
            <span class="text-xs text-gray-500 ml-1">km/h</span>
        </div>
        <div class="glass p-4 rounded-2xl border border-white/5">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">GPS Status</span>
            <span id="gps-status" class="text-sm font-bold text-red-400 uppercase">Offline</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex-1 glass p-6 rounded-3xl border border-white/10 space-y-4 flex flex-col justify-end">
        <div class="space-y-1">
            <p class="text-xs text-indigo-400 font-bold uppercase tracking-widest">Logged in as</p>
            <h2 id="user-name" class="text-2xl font-bold">Loading...</h2>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button id="online-btn" onclick="toggleOnline()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold transition-all flex items-center justify-center space-x-3">
                <span id="online-icon" class="w-3 h-3 bg-white rounded-full"></span>
                <span id="online-text">GO ONLINE (REAL GPS)</span>
            </button>
            
            <button id="mock-btn" onclick="toggleMock()" class="w-full py-5 glass border border-white/10 hover:bg-white/5 rounded-2xl font-bold transition-all flex items-center justify-center space-x-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span id="mock-text">START MOCK (ROAD ONLY)</span>
            </button>
        </div>
        
        <p class="text-[10px] text-center text-gray-500 font-medium px-4">
            Real GPS uses device sensors. Mock Movement calculates nearby road routes using OSRM.
        </p>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="app.js?v=1"></script>
    <script src="driver.js?v=1"></script>
</body>
</html>
