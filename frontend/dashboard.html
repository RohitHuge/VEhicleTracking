<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - VehiX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030014; color: white; }
        #map { height: 100%; width: 100%; border-radius: 24px; }
        .sidebar { width: 380px; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .card { background: #0a0a1a; border: 1px solid rgba(255, 255, 255, 0.05); }
        /* Custom Leaflet Controls */
        .leaflet-bar { border: none !important; border-radius: 12px !important; overflow: hidden; }
        .leaflet-bar a { background-color: #1f2937 !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .leaflet-container { background: #030014 !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside class="sidebar h-full flex flex-col p-6 bg-[#030014] border-r border-white/5 space-y-8 overflow-y-auto">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-xl">V</div>
                <h1 class="text-xl font-bold tracking-tight">VehiX</h1>
            </div>
            <button onclick="logout()" class="p-2 hover:bg-white/5 rounded-xl transition-colors text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>

        <div class="space-y-1">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest px-2">Welcome</h2>
            <p id="user-name" class="text-lg font-bold px-2 text-indigo-400">User</p>
        </div>

        <div class="space-y-4">
            <button onclick="addVehicle()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>Add New Vehicle</span>
            </button>
            <div id="list" class="space-y-3">
                <!-- Vehicle list items here -->
                <div class="animate-pulse flex space-x-4">
                  <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-gray-800 rounded w-3/4"></div>
                    <div class="space-y-2">
                      <div class="h-4 bg-gray-800 rounded"></div>
                      <div class="h-4 bg-gray-800 rounded w-5/6"></div>
                    </div>
                  </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full flex flex-col p-6 space-y-6">
        <!-- Stats Header -->
        <header class="flex space-x-6">
            <div class="flex-1 card rounded-3xl p-6 flex flex-col justify-between h-32 relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-indigo-500/10 rounded-full group-hover:scale-150 transition-all"></div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Fleet</span>
                <span id="total-v" class="text-4xl font-bold">0</span>
            </div>
            <div class="flex-1 card rounded-3xl p-6 flex flex-col justify-between h-32 relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-green-500/10 rounded-full group-hover:scale-150 transition-all"></div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Active Now</span>
                <span id="active-v" class="text-4xl font-bold text-green-400">0</span>
            </div>
            <div class="flex-1 card rounded-3xl p-6 flex flex-col justify-between h-32 relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-blue-500/10 rounded-full group-hover:scale-150 transition-all"></div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Avg Speed</span>
                <span id="avg-speed" class="text-4xl font-bold text-blue-400">0 km/h</span>
            </div>
        </header>

        <!-- Map Container -->
        <div class="flex-1 relative">
            <div id="map"></div>
            <!-- Live Indicator Overlay -->
            <div class="absolute top-6 right-6 z-[1000] glass px-4 py-2 rounded-full border border-white/10 flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                <span class="text-xs font-bold uppercase tracking-wider">Live System Active</span>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
